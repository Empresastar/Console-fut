<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CONTROLE GOLAZO</title>
    <script src="https://unpkg.com/peerjs@1.3.1/dist/peerjs.min.js"></script>
    <style>
        body { background: #111; color: #fff; margin: 0; text-align: center; font-family: sans-serif; overflow: hidden; touch-action: none; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); width: 220px; margin: 30px auto; gap: 10px; }
        .btn { background: #333; height: 75px; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 30px; border-bottom: 5px solid #000; }
        .btn:active { background: #555; transform: translateY(5px); border: none; }
        .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 20px; }
        .act { height: 80px; border-radius: 40px; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 3px solid #fff; }
    </style>
</head>
<body>
    <h2 id="st">CONECTANDO...</h2>
    <div class="grid">
        <div></div> <div class="btn" ontouchstart="send('U')">↑</div> <div></div>
        <div class="btn" ontouchstart="send('L')">←</div> <div></div> <div class="btn" ontouchstart="send('R')">→</div>
        <div></div> <div class="btn" ontouchstart="send('D')">↓</div> <div></div>
    </div>
    <div class="actions">
        <div class="act" style="background:#007bff; grid-column:span 2; height: 50px; margin-bottom:10px;" ontouchstart="send('T')">TROCAR JOGADOR</div>
        <div class="act" style="background:#28a745" ontouchstart="send('P')">PASSE</div>
        <div class="act" style="background:#dc3545" ontouchstart="send('S')">CHUTE</div>
    </div>
    <script>
        const SALA_TV = "GOLAZO_PRO_PE_2026";
        const peer = new Peer();
        let conn;
        peer.on('open', () => { 
            conn = peer.connect(SALA_TV, { reliable: false });
            conn.on('open', () => document.getElementById('st').innerText = "CONECTADO!");
        });
        function send(c) { if(conn && conn.open) conn.send(c); }
    </script>
</body>
</html>
