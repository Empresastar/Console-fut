<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>GOLAZO - ARENA TV</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.3.1/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #overlay { position: absolute; top: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.8); color: #fff; }
        .score { position: absolute; top: 20px; font-size: 50px; color: #fff; text-shadow: 2px 2px #000; width: 100%; text-align: center; }
    </style>
</head>
<body>
    <div id="overlay">
        <h1>AGUARDANDO CONTROLES...</h1>
        <p>ID DA SALA: <strong style="color: #00ff00;">GOLAZO_2026</strong></p>
    </div>
    <div class="score" id="placar" style="display:none;">0 - 0</div>

    <script>
        const peer = new Peer("GOLAZO_2026");
        peer.on('connection', conn => {
            document.getElementById('overlay').innerHTML = "<h1>CONTROLE CONECTADO!</h1><p>Aguardando Player 2...</p>";
            conn.on('data', data => { console.log("Comando:", data); /* Lógica de movimento 3D aqui */ });
        });
        // Aqui você insere o código do Three.js que já desenvolvemos
    </script>
</body>
</html>
