<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>GOLAZO 2026 - ARENA TV</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.3.1/dist/peerjs.min.js"></script>
    <style>body { margin: 0; overflow: hidden; background: #000; }</style>
</head>
<body>
    <div id="ui" style="position: absolute; color: white; width: 100%; text-align: center; top: 20px; font-family: Arial; font-size: 30px;">
        ID DA SALA: <span style="color: #00ff00;">GOLAZO_2026</span>
    </div>
    <script>
        // Configuração Básica do Jogo 3D
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer();
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Luz e Campo
        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const grass = new THREE.Mesh(new THREE.PlaneGeometry(100, 60), new THREE.MeshPhongMaterial({color: 0x228b22}));
        grass.rotation.x = -Math.PI / 2;
        scene.add(grass);

        // A Bola
        const ballGeo = new THREE.SphereGeometry(1, 32, 32);
        const ballMat = new THREE.MeshPhongMaterial({color: 0xffffff});
        const ball = new THREE.Mesh(ballGeo, ballMat);
        ball.position.y = 1;
        scene.add(ball);

        camera.position.set(0, 30, 40);
        camera.lookAt(0,0,0);

        // Conexão com o Controle
        const peer = new Peer("GOLAZO_2026");
        peer.on('connection', conn => {
            conn.on('data', data => {
                if(data === 'U') ball.position.z -= 1;
                if(data === 'D') ball.position.z += 1;
                if(data === 'L') ball.position.x -= 1;
                if(data === 'R') ball.position.x += 1;
            });
        });

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
