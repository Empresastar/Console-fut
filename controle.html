<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CONTROLE GOLAZO</title>
    <script src="https://unpkg.com/peerjs@1.3.1/dist/peerjs.min.js"></script>
    <style>
        :root { --cor: #333; }
        body { background: #111; color: white; text-align: center; font-family: sans-serif; touch-action: none; margin: 0; }
        .pad { display: grid; grid-template-columns: repeat(3, 1fr); width: 240px; margin: 40px auto; gap: 10px; }
        .btn { background: var(--cor); height: 80px; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 30px; border-bottom: 5px solid #000; }
        .config { background: #444; padding: 10px; margin: 10px; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="st">CONECTANDO...</div>
    <div class="pad">
        <div></div> <div class="btn" onclick="send('U')">↑</div> <div></div>
        <div class="btn" onclick="send('L')">←</div> <div></div> <div class="btn" onclick="send('R')">→</div>
        <div></div> <div class="btn" onclick="send('D')">↓</div> <div></div>
    </div>
    <div class="config" onclick="mudarCor()">PERSONALIZAR COR</div>

    <script>
        const peer = new Peer();
        let conn;
        peer.on('open', () => {
            conn = peer.connect("GOLAZO_2026");
            conn.on('open', () => document.getElementById('st').innerText = "CONECTADO!");
        });
        function send(m) { if(conn) conn.send(m); }
        function mudarCor() { 
            const nova = prompt("Digite uma cor (ex: red, blue, green):");
            document.documentElement.style.setProperty('--cor', nova);
        }
    </script>
</body>
</html>
