<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>GOLAZO 2026 - TELA PRINCIPAL</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.3.1/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Arial Black', sans-serif; color: white; }
        
        /* TELA DE LOBBY (MENU) */
        #lobby { position: absolute; width: 100%; height: 100%; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle, #1a1a1a, #000); }
        .cards { display: flex; gap: 30px; margin: 20px; }
        .card { width: 180px; padding: 20px; border: 4px solid #444; border-radius: 15px; text-align: center; background: rgba(255,255,255,0.05); }
        .card.active { border-color: #00ff00; box-shadow: 0 0 20px #00ff00; }
        #btn-start { padding: 15px 50px; font-size: 22px; background: #00ff00; border: none; border-radius: 10px; cursor: pointer; display: none; font-weight: bold; }

        /* INTERFACE DO JOGO */
        #hud { position: absolute; top: 20px; width: 100%; text-align: center; display: none; z-index: 10; }
        .placar { font-size: 35px; background: rgba(0,0,0,0.8); padding: 10px 40px; border-radius: 50px; border: 2px solid #fff; display: inline-block; }
        #gol-msg { position: absolute; top: 40%; width: 100%; text-align: center; font-size: 80px; color: yellow; display: none; text-shadow: 5px 5px #000; z-index: 50; }
    </style>
</head>
<body>

    <div id="lobby">
        <h1>GOLAZO ULTRA 2026</h1>
        <p>Aguardando conexão dos celulares...</p>
        <div class="cards">
            <div id="p1-card" class="card">PLAYER 1<br><span id="p1-s">OFFLINE</span></div>
            <div id="p2-card" class="card">PLAYER 2<br><span id="p2-s">OFFLINE</span></div>
        </div>
        <button id="btn-start" onclick="initGame()">INICIAR PARTIDA</button>
    </div>

    <div id="hud"><div class="placar">P1 <span id="s1">0</span> - <span id="s2">0</span> P2</div></div>
    <div id="gol-msg">GOOOOOL!!</div>

    <script>
        const SALA_ID = "GOLAZO_PRO_PE_2026"; // ID Único
        let gameActive = false, p1C = null, p2C = null;
        let p1Idx = 0, p2Idx = 0, score1 = 0, score2 = 0;
        
        // --- CONEXÃO ---
        const peer = new Peer(SALA_ID);
        peer.on('connection', c => {
            if (!p1C) {
                p1C = c; document.getElementById('p1-card').classList.add('active'); document.getElementById('p1-s').innerText="PRONTO";
            } else if (!p2C) {
                p2C = c; document.getElementById('p2-card').classList.add('active'); document.getElementById('p2-s').innerText="PRONTO";
            }
            document.getElementById('btn-start').style.display = 'block';
            c.on('data', d => { if(gameActive) handleInput(c, d); });
        });

        // --- VARIÁVEIS DO MOTOR ---
        let world, scene, camera, renderer, bBody, bMesh, t1=[], t2=[];

        function initGame() {
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('hud').style.display = 'block';
            gameActive = true;

            world = new CANNON.World(); world.gravity.set(0, -30, 0);
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.set(0, 55, 45); camera.lookAt(0,0,0);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 1));

            // Campo e Paredes (Arena Fechada)
            const grass = new THREE.Mesh(new THREE.PlaneGeometry(100, 70), new THREE.MeshPhongMaterial({color: 0x228b22}));
            grass.rotation.x = -Math.PI/2; scene.add(grass);
            const groundBody = new CANNON.Body({ mass: 0 });
            groundBody.addShape(new CANNON.Plane());
            groundBody.quaternion.setFromAxisAngle(new CANNON.Vec3(1,0,0), -Math.PI/2);
            world.addBody(groundBody);

            function addW(w,h,d,x,z){ const b=new CANNON.Body({mass:0,shape:new CANNON.Box(new CANNON.Vec3(w/2,h/2,d/2))}); b.position.set(x,h/2,z); world.addBody(b); }
            addW(100,20,1,0,21); addW(100,20,1,0,-21); // Laterais
            addW(1,20,15,35,13); addW(1,20,15,35,-13); addW(1,20,15,-35,13); addW(1,20,15,-35,-13); // Fundos

            // Bola
            bBody = new CANNON.Body({ mass: 1, shape: new CANNON.Sphere(0.8) });
            bBody.position.set(0, 5, 0); world.addBody(bBody);
            bMesh = new THREE.Mesh(new THREE.SphereGeometry(0.8, 16, 16), new THREE.MeshPhongMaterial({color: 0xffffff}));
            scene.add(bMesh);

            // Criar Times
            const createT = (arr, col, side) => {
                const pos = [{x: side*32, z: 0}, {x: side*18, z: -8}, {x: side*18, z: 8}, {x: side*8, z: 0}];
                pos.forEach(p => {
                    const b = new CANNON.Body({ mass: 10, shape: new CANNON.Box(new CANNON.Vec3(1, 1.5, 1)) });
                    b.position.set(p.x, 2, p.z); b.fixedRotation = true;
                    world.addBody(b);
                    const m = new THREE.Mesh(new THREE.BoxGeometry(2, 3, 2), new THREE.MeshPhongMaterial({color: col}));
                    scene.add(m); arr.push({body: b, mesh: m, side: side});
                });
            };
            createT(t1, 0xffff00, -1); createT(t2, 0xff0000, 1);
            animate();
        }

        function handleInput(c, d) {
            const t = (c === p1C) ? t1 : t2;
            if (d === 'T') { if(c === p1C) p1Idx = (p1Idx+1)%4; else p2Idx = (p2Idx+1)%4; return; }
            const p = t[(c === p1C) ? p1Idx : p2Idx];
            const s = 25;
            if(d === 'U') p.body.velocity.z = -s; if(d === 'D') p.body.velocity.z = s;
            if(d === 'L') p.body.velocity.x = -s; if(d === 'R') p.body.velocity.x = s;
            if(p.body.position.distanceTo(bBody.position) < 5) {
                if(d === 'S') bBody.velocity.set(p.side === -1 ? 55 : -55, 12, 0); // Chute
                if(d === 'P') bBody.velocity.set(0, 5, p.body.position.z > 0 ? -25 : 25); // Passe
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            world.step(1/60);
            bMesh.position.copy(bBody.position);
            t1.forEach(p => p.mesh.position.copy(p.body.position));
            t2.forEach(p => p.mesh.position.copy(p.body.position));
            
            if(bBody.position.x > 35.5 && Math.abs(bBody.position.z) < 5) { score1++; reset(); }
            if(bBody.position.x < -35.5 && Math.abs(bBody.position.z) < 5) { score2++; reset(); }
            renderer.render(scene, camera);
        }

        function reset() {
            document.getElementById('s1').innerText = score1; document.getElementById('s2').innerText = score2;
            document.getElementById('gol-msg').style.display = 'block';
            bBody.position.set(0, 10, 0); bBody.velocity.set(0,0,0);
            setTimeout(() => document.getElementById('gol-msg').style.display = 'none', 1500);
        }
    </script>
</body>
</html>
