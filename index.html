<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOLAZO 2026 - PORTAL</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        .card { background: #111; padding: 40px; border-radius: 30px; border: 2px solid #333; width: 85%; max-width: 400px; }
        h1 { color: #00ff00; margin-bottom: 20px; }
        .btn { display: block; padding: 20px; margin: 15px auto; border-radius: 15px; text-decoration: none; font-weight: bold; color: #000; transition: 0.3s; }
        .tv-mode { background: #fff; }
        .cell-mode { background: #00ccff; }
    </style>
</head>
<body>
    <div class="card">
        <h1>GOLAZO 2026</h1>
        <div id="options">
            <p>Detectando dispositivo...</p>
        </div>
    </div>
    <script>
        const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
        const options = document.getElementById('options');
        
        if (isMobile) {
            options.innerHTML = `
                <a href="mobile_game.html" class="btn tv-mode">⚽ JOGAR NESTA TELA</a>
                <a href="controle.html" class="btn cell-mode">🎮 SER CONTROLE (P/ TV)</a>
            `;
        } else {
            window.location.href = "arena.html";
        }
    </script>
</body>
</html>
