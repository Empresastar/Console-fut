<!DOCTYPE html>
<html>
<head>
    <title>AirConsole Clone - TV</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white flex flex-col items-center justify-center h-screen overflow-hidden">
    <h1 class="text-2xl mb-4">Código da Sala: <span id="pin" class="text-yellow-400 font-bold">Gerando...</span></h1>
    <div id="player" class="w-16 h-16 bg-blue-500 rounded-lg absolute transition-all duration-100" style="top:50%; left:50%;"></div>

    <script>
        const socket = io('https://seu-servidor-aqui.onrender.com'); // Vamos criar isso no passo 2
        const player = document.getElementById('player');
        let pos = { x: 50, y: 50 };

        socket.emit('create-room');
        socket.on('room-ready', pin => document.getElementById('pin').innerText = pin);

        socket.on('game-command', cmd => {
            if(cmd === 'left') pos.x -= 5;
            if(cmd === 'right') pos.x += 5;
            if(cmd === 'up') pos.y -= 5;
            if(cmd === 'down') pos.y += 5;
            player.style.left = pos.x + '%';
            player.style.top = pos.y + '%';
        });
    </script>
</body>
</html>
